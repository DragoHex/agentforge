<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Status Report</title>
<style>
  :root { --ivory:#FAF9F5; --slate:#141413; --clay:#D97757; --olive:#788C5D; --oat:#E3DACC; --gray-150:#F0EEE6; --gray-300:#D1CFC5; --gray-500:#87867F; --gray-700:#3D3D3A; --white:#FFF; --danger:#B04A4A; --warning:#C78E3F; --info:#5C7CA3; --font-sans:system-ui,-apple-system,sans-serif; --font-mono:ui-monospace,Menlo,monospace; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font:430 16px/1.55 var(--font-sans);color:var(--slate);background:var(--ivory);max-width:960px;margin:0 auto;padding:32px 24px;-webkit-font-smoothing:antialiased}
  h1{font:500 32px/1.2 var(--font-sans);margin-bottom:4px}
  h2{font:500 24px/1.3 var(--font-sans);margin:32px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--gray-300)}
  .byline{color:var(--gray-500);font-size:14px;margin-bottom:32px}

  /* ── Metrics Row ── */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:32px}
  .metric{background:var(--white);border:1px solid var(--gray-300);border-radius:12px;padding:20px;text-align:center}
  .metric .value{font:500 36px/1.1 var(--font-sans);color:var(--slate)}
  .metric .label{font-size:12px;color:var(--gray-500);margin-top:4px}
  .metric .delta{font:12px var(--font-mono);color:var(--olive);margin-top:2px}
  .metric .delta.negative{color:var(--danger)}

  /* ── Highlights ── */
  .highlights{background:var(--white);border:1px solid var(--gray-300);border-radius:12px;padding:20px 24px;margin-bottom:32px}
  .highlights li{font-size:14px;margin-bottom:8px;padding-left:4px}
  .highlights li::marker{color:var(--clay)}

  /* ── Shipped Table ── */
  table{width:100%;border-collapse:collapse;margin-bottom:32px;font-size:14px}
  th{text-align:left;font:500 12px/1.4 var(--font-sans);color:var(--gray-500);text-transform:uppercase;letter-spacing:.03em;padding:8px 12px;border-bottom:1px solid var(--gray-300)}
  td{padding:10px 12px;border-bottom:1px solid var(--gray-150)}
  td:first-child{font:13px var(--font-mono);color:var(--gray-500)}
  td:nth-child(2){font-weight:500}
  td:last-child{font:11px var(--font-mono)}

  .risk-high{color:var(--danger)}
  .risk-med{color:var(--warning)}
  .risk-low{color:var(--olive)}

  /* ── Velocity Chart ── */
  .chart-container{margin-bottom:32px}
  .chart-bars{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px}
  .chart-bar-wrapper{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .chart-bar{width:100%;max-width:40px;background:var(--clay);border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
  .chart-bar-label{font:11px var(--font-mono);color:var(--gray-500)}

  /* ── Carryover ── */
  .carryover-list{background:var(--white);border:1px solid var(--gray-300);border-radius:12px;overflow:hidden;margin-bottom:32px}
  .carryover-item{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid var(--gray-150)}
  .carryover-item:last-child{border-bottom:none}
  .carryover-status{font:11px/1.4 var(--font-sans);text-transform:uppercase;letter-spacing:.03em;padding:2px 8px;border-radius:4px;white-space:nowrap;min-width:72px;text-align:center}
  .carryover-status.review{background:var(--info);color:var(--white)}
  .carryover-status.blocked{background:var(--warning);color:var(--white)}
  .carryover-status.slipped{background:var(--danger);color:var(--white)}
  .carryover-desc{font-size:14px}
  .carryover-owner{font-size:12px;color:var(--gray-500)}
</style>
</head>
<body>

<h1><!-- TEAM — Week of MON DD --></h1>
<p class="byline"><!-- Optional: summary line --></p>

<div class="metrics">
  <!-- 
  METRIC — repeat for each:
  <div class="metric">
    <div class="value">N</div>
    <div class="label">Label</div>
    <div class="delta [negative]">±change</div>
  </div>
  -->
  <div class="metric">
    <div class="value">14</div>
    <div class="label">PRs merged</div>
    <div class="delta">+3 vs wk10</div>
  </div>
  <div class="metric">
    <div class="value">6</div>
    <div class="label">Deploys</div>
    <div class="delta">±0</div>
  </div>
  <div class="metric">
    <div class="value">1</div>
    <div class="label">Incidents</div>
    <div class="delta negative">SEV-2 · 47m</div>
  </div>
  <div class="metric">
    <div class="value">99.1%</div>
    <div class="label">Test pass rate</div>
    <div class="delta">+3 fixed</div>
  </div>
  <div class="metric">
    <div class="value">184ms</div>
    <div class="label">API p95 latency</div>
    <div class="delta">↓ 12% wk/wk</div>
  </div>
</div>

<h2>Highlights</h2>
<ul class="highlights">
  <li><!-- Key accomplishment with impact --></li>
  <li><!-- Another accomplishment --></li>
  <li><!-- A risk or note --></li>
</ul>

<h2>Shipped</h2>
<table>
  <thead>
    <tr><th>PR</th><th>Title</th><th>Author</th><th>Risk</th></tr>
  </thead>
  <tbody>
    <!-- 
    ROW — repeat for each shipped item:
    <tr>
      <td>#NNNN</td>
      <td>Title description</td>
      <td>Author Name</td>
      <td class="risk-high|risk-med|risk-low">High|Med|Low</td>
    </tr>
    -->
  </tbody>
</table>

<h2>Velocity</h2>
<div class="chart-container">
  <div class="chart-bars">
    <!-- 
    BAR — repeat for each day:
    <div class="chart-bar-wrapper">
      <div class="chart-bar" style="height: VALUEpx"></div>
      <div class="chart-bar-label">Mon</div>
    </div>
    -->
    <div class="chart-bar-wrapper">
      <div class="chart-bar" style="height:20px"></div>
      <div class="chart-bar-label">Mon</div>
    </div>
    <div class="chart-bar-wrapper">
      <div class="chart-bar" style="height:40px"></div>
      <div class="chart-bar-label">Tue</div>
    </div>
    <div class="chart-bar-wrapper">
      <div class="chart-bar" style="height:60px"></div>
      <div class="chart-bar-label">Wed</div>
    </div>
    <div class="chart-bar-wrapper">
      <div class="chart-bar" style="height:80px"></div>
      <div class="chart-bar-label">Thu</div>
    </div>
    <div class="chart-bar-wrapper">
      <div class="chart-bar" style="height:50px"></div>
      <div class="chart-bar-label">Fri</div>
    </div>
  </div>
</div>

<h2>Carryover</h2>
<div class="carryover-list">
  <!-- 
  ITEM — repeat for each:
  <div class="carryover-item">
    <span class="carryover-status review|blocked|slipped">Status</span>
    <div>
      <div class="carryover-desc">Description</div>
      <div class="carryover-owner">· Owner Name</div>
    </div>
  </div>
  -->
</div>

</body>
</html>
