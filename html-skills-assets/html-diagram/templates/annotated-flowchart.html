<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annotated Flowchart</title>
<style>
  /* ── Import shared palette ── */
  :root {
    --ivory: #FAF9F5; --slate: #141413; --clay: #D97757; --olive: #788C5D;
    --oat: #E3DACC; --gray-150: #F0EEE6; --gray-300: #D1CFC5; --gray-500: #87867F;
    --gray-700: #3D3D3A; --white: #FFFFFF; --danger: #B04A4A; --info: #5C7CA3;
    --font-sans: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 430 16px/1.55 var(--font-sans);
    color: var(--slate); background: var(--ivory);
    max-width: 960px; margin: 0 auto; padding: 32px 24px;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font: 500 32px/1.2 var(--font-sans); margin-bottom: 8px; }
  h2 { font: 500 24px/1.3 var(--font-sans); margin: 32px 0 8px; }
  p { margin-bottom: 16px; }
  .subtitle { color: var(--gray-500); font-size: 14px; margin-bottom: 32px; }

  /* ── Diagram Container ── */
  .diagram-wrap {
    background: var(--white);
    border: 1px solid var(--gray-300);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
    overflow-x: auto;
  }
  .diagram-wrap svg { display: block; margin: 0 auto; }

  /* ── Detail Panel ── */
  .detail-panel {
    background: var(--gray-150);
    border: 1px solid var(--gray-300);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
    display: none;
  }
  .detail-panel.active { display: block; }
  .detail-panel h3 { font: 500 18px/1.3 var(--font-sans); margin-bottom: 8px; }
  .detail-panel .meta { font: 12px/1.4 var(--font-mono); color: var(--gray-500); margin-bottom: 12px; }
  .detail-panel .desc { font-size: 14px; color: var(--gray-700); }
  .detail-panel .timing { display: inline-block; background: var(--oat); padding: 4px 10px; border-radius: 4px; font: 12px var(--font-mono); margin-right: 12px; }
  .detail-panel .failure { color: var(--danger); font-size: 13px; margin-top: 8px; }
  .detail-panel .failure::before { content: "⚠ "; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 16px;
    background: var(--white);
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    font: 12px/1.4 var(--font-sans);
    color: var(--gray-500);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }

  /* ── Clickable step cursor ── */
  .clickable-step { cursor: pointer; }
  .clickable-step:hover rect { stroke: var(--clay) !important; stroke-width: 2.5px !important; }
</style>
</head>
<body>

<h1><!-- TITLE: Flowchart name --></h1>
<p class="subtitle"><!-- SUBTITLE: Brief description --></p>

<div class="diagram-wrap">
  <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#87867F"/>
      </marker>
      <marker id="arrow-clay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97757"/>
      </marker>
      <marker id="arrow-olive" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#788C5D"/>
      </marker>
      <marker id="arrow-danger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#B04A4A"/>
      </marker>
    </defs>

    <!-- ===== FLOWCHART STEPS GO HERE ===== -->
    <!-- 
      PROCESS STEP pattern:
      <g class="clickable-step" onclick="showDetail('step-id')">
        <rect x="..." y="..." width="160" height="44" rx="10" fill="#FAF9F5" stroke="#D1CFC5" stroke-width="1.5"/>
        <text x="..." y="..." text-anchor="middle" font-family="monospace" font-size="11" fill="#141413">Label</text>
      </g>

      DECISION pattern (diamond):
      <g class="clickable-step" onclick="showDetail('step-id')">
        <polygon points="..." fill="#F0EEE6" stroke="#87867F" stroke-width="1.5"/>
        <text x="..." y="..." text-anchor="middle" font-family="monospace" font-size="11" fill="#141413">Label</text>
      </g>

      ARROW pattern:
      <line x1="..." y1="..." x2="..." y2="..." stroke="#87867F" stroke-width="1.5" marker-end="url(#arrow)"/>

      ANNOTATION pattern:
      <text x="..." y="..." fill="#87867F" font-size="12" font-family="sans-serif">~2 min</text>
    -->
  </svg>
</div>

<!-- Detail panels for each clickable step -->
<div class="detail-panel" id="detail-step-id">
  <h3><!-- Step name --></h3>
  <div class="meta">
    <span class="timing"><!-- e.g., ~2 min --></span>
    <!-- e.g., ci.yml -->
  </div>
  <p class="desc"><!-- What runs in this step --></p>
  <!-- <p class="failure">Failure path: ...</p> -->
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#FAF9F5;border:1.5px solid #D1CFC5"></div> Process step</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#F0EEE6;border:1.5px solid #87867F;transform:rotate(45deg)"></div> Decision</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#788C5D;border-radius:20px"></div> Terminal</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#D97757"></div> In focus</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#788C5D"></div> Success</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#B04A4A"></div> Failure</div>
</div>

<script>
  function showDetail(id) {
    // Hide all detail panels
    document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
    // Show the clicked one
    const panel = document.getElementById('detail-' + id);
    if (panel) panel.classList.add('active');
    // Highlight the clicked step
    document.querySelectorAll('.clickable-step').forEach(g => {
      const rect = g.querySelector('rect');
      if (rect) rect.setAttribute('stroke', '#D1CFC5');
    });
  }
</script>

</body>
</html>
