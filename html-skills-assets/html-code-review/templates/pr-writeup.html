<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Writeup</title>
<style>
  :root { --ivory:#FAF9F5; --slate:#141413; --clay:#D97757; --olive:#788C5D; --oat:#E3DACC; --gray-150:#F0EEE6; --gray-300:#D1CFC5; --gray-500:#87867F; --gray-700:#3D3D3A; --white:#FFF; --danger:#B04A4A; --warning:#C78E3F; --info:#5C7CA3; --font-sans:system-ui,-apple-system,sans-serif; --font-mono:ui-monospace,Menlo,monospace; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font:430 16px/1.55 var(--font-sans);color:var(--slate);background:var(--ivory);max-width:960px;margin:0 auto;padding:32px 24px;-webkit-font-smoothing:antialiased}
  h1{font:500 32px/1.2 var(--font-sans);margin-bottom:4px}
  h2{font:500 20px/1.3 var(--font-sans);margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--gray-300)}
  .subtitle{color:var(--gray-500);font-size:14px;margin-bottom:24px}

  .tldr{background:var(--white);border-left:3px solid var(--clay);border-radius:0 12px 12px 0;padding:18px 24px;margin-bottom:28px}
  .tldr h3{font:500 15px/1.3 var(--font-sans);color:var(--clay);margin-bottom:6px}
  .tldr p{font-size:14px;color:var(--gray-700);margin:0}

  .before-after{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
  .ba-col{background:var(--white);border:1px solid var(--gray-300);border-radius:12px;overflow:hidden}
  .ba-col h4{font:500 13px/1.4 var(--font-sans);padding:10px 16px;border-bottom:1px solid var(--gray-300)}
  .ba-col.before h4{background:var(--gray-150);color:var(--gray-500)}
  .ba-col.after h4{background:var(--olive);color:var(--white)}
  .ba-col .metric{display:flex;justify-content:space-between;padding:8px 16px;font-size:14px;border-bottom:1px solid var(--gray-150)}
  .ba-col .metric:last-child{border-bottom:none}
  .ba-col .metric .val{font:13px var(--font-mono);color:var(--slate)}
  .ba-col.after .metric .val{color:var(--olive)}

  .file-tour{margin-bottom:24px}
  .file-entry{background:var(--white);border:1px solid var(--gray-300);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .file-entry .fe-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;user-select:none}
  .file-entry .fe-header:hover{background:var(--gray-150)}
  .file-entry .fe-path{font:13px var(--font-mono);color:var(--slate)}
  .file-entry .fe-meta{display:flex;align-items:center;gap:8px}
  .file-entry .fe-tag{font:10px var(--font-mono);padding:2px 8px;border-radius:4px;background:var(--clay);color:var(--white)}
  .file-entry .fe-tag.skim{background:var(--gray-300);color:var(--slate)}
  .file-entry .fe-body{display:none;padding:0 20px 20px;border-top:1px solid var(--gray-150)}
  .file-entry.open .fe-body{display:block}
  .file-entry .fe-body p{font-size:14px;color:var(--gray-700);margin:12px 0}
  .file-entry .fe-body pre{font-size:13px;background:var(--ivory);margin-top:8px}

  .focus-list{counter-reset:focus;list-style:none;padding:0}
  .focus-list li{counter-increment:focus;padding:12px 0 12px 32px;position:relative;font-size:14px;color:var(--gray-700);border-bottom:1px solid var(--gray-150)}
  .focus-list li::before{content:counter(focus);position:absolute;left:0;top:12px;width:22px;height:22px;border-radius:50%;background:var(--clay);color:var(--white);font:500 12px/22px var(--font-sans);text-align:center}

  .test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
  .test-card{background:var(--white);border:1px solid var(--gray-300);border-radius:10px;padding:16px}
  .test-card h4{font:500 14px/1.4 var(--font-sans);margin-bottom:4px}
  .test-card p{font-size:13px;color:var(--gray-500);margin:0}

  .ramp{display:flex;align-items:center;gap:8px;margin-top:8px}
  .ramp-step{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-700)}
  .ramp-dot{width:10px;height:10px;border-radius:50%;background:var(--gray-300)}
  .ramp-dot.active{background:var(--clay)}
  .ramp-line{width:24px;height:1px;background:var(--gray-300)}
</style>
</head>
<body>

<h1><!-- PR #NNN — Title --></h1>
<p class="subtitle"><!-- Author · date · branch → target --></p>

<div class="tldr">
  <h3>TL;DR</h3>
  <p><!-- 2-sentence summary of what this PR does and why. --></p>
</div>

<h2>Why</h2>
<p style="font-size:14px;color:var(--gray-700);margin-bottom:16px"><!-- Rationale: what problem existed, what changed that made it a problem now, why this fix. --></p>

<div class="before-after">
  <div class="ba-col before">
    <h4>Before</h4>
    <div class="metric"><span><!-- metric --></span><span class="val"><!-- old value --></span></div>
    <div class="metric"><span><!-- metric --></span><span class="val"><!-- old value --></span></div>
  </div>
  <div class="ba-col after">
    <h4>After</h4>
    <div class="metric"><span><!-- metric --></span><span class="val"><!-- new value --></span></div>
    <div class="metric"><span><!-- metric --></span><span class="val"><!-- new value --></span></div>
  </div>
</div>

<h2>File-by-file</h2>
<p style="font-size:13px;color:var(--gray-500);margin-bottom:12px">Ordered for reading, not alphabetically.</p>

<div class="file-tour">
  <!-- 
  FILE ENTRY — repeat for each:
  <div class="file-entry open">
    <div class="fe-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="fe-path">packages/x/src/file.ts</span>
      <div class="fe-meta">
        <span class="fe-tag">new +126</span>
        <span class="fe-tag skim">start here</span>
      </div>
    </div>
    <div class="fe-body">
      <p>Why this file matters.</p>
      <pre>Key code snippet</pre>
    </div>
  </div>
  -->
</div>

<h2>Where to focus your review</h2>
<ol class="focus-list">
  <li><strong><!-- Area 1 --></strong> — <!-- Why it's tricky/risky --></li>
  <li><strong><!-- Area 2 --></strong> — <!-- Why --></li>
  <li><strong><!-- Area 3 --></strong> — <!-- What was deliberately not done --></li>
</ol>

<h2>Test plan</h2>
<div class="test-grid">
  <div class="test-card"><h4>Unit</h4><p><!-- Coverage --></p></div>
  <div class="test-card"><h4>Integration</h4><p><!-- Coverage --></p></div>
  <div class="test-card"><h4>Staging load</h4><p><!-- Perf numbers --></p></div>
  <div class="test-card"><h4>Manual</h4><p><!-- Edge case testing --></p></div>
</div>

<h2>Rollout</h2>
<p style="font-size:13px;color:var(--gray-500);margin-bottom:12px">Behind <code><!-- flag_name --></code>.</p>
<div class="ramp">
  <div class="ramp-step"><span class="ramp-dot active"></span> Day 0 · internal</div>
  <div class="ramp-line"></div>
  <div class="ramp-step"><span class="ramp-dot"></span> Day 2 · 10%</div>
  <div class="ramp-line"></div>
  <div class="ramp-step"><span class="ramp-dot"></span> Day 4 · 100%</div>
</div>

</body>
</html>
