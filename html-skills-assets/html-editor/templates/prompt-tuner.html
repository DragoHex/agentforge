<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Tuner</title>
<style>
  :root { --ivory:#FAF9F5; --slate:#141413; --clay:#D97757; --olive:#788C5D; --oat:#E3DACC; --gray-150:#F0EEE6; --gray-300:#D1CFC5; --gray-500:#87867F; --gray-700:#3D3D3A; --white:#FFF; --info:#5C7CA3; --font-sans:system-ui,-apple-system,sans-serif; --font-mono:ui-monospace,Menlo,monospace; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font:430 16px/1.55 var(--font-sans);color:var(--slate);background:var(--ivory);padding:24px;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  h1{font:500 24px/1.2 var(--font-sans);margin-bottom:4px}
  .subtitle{color:var(--gray-500);font-size:13px;margin-bottom:4px}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-shrink:0}
  .btn{font:500 13px/1.4 var(--font-sans);padding:7px 16px;border-radius:7px;border:1px solid var(--gray-300);background:var(--white);cursor:pointer}
  .btn:hover{background:var(--gray-150)}
  .btn.primary{background:var(--slate);color:var(--white);border-color:var(--slate)}
  .copied-toast{font:13px var(--font-sans);color:var(--olive);display:none}
  .copied-toast.show{display:inline}
  .stats{font:12px var(--font-mono);color:var(--gray-500);margin-left:auto}
  .slot-info{font-size:12px;color:var(--info);display:flex;gap:8px;flex-wrap:wrap}

  /* Main split pane */
  .main-pane{display:flex;gap:16px;flex:1;min-height:0}
  .left-pane{flex:1;display:flex;flex-direction:column;min-width:0}
  .right-pane{flex:1;display:flex;flex-direction:column;min-width:0;gap:12px;overflow-y:auto}

  /* Textarea */
  .editor-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
  .editor-wrap label{font:500 12px/1.4 var(--font-sans);color:var(--gray-500);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
  textarea{flex:1;font:14px/1.6 var(--font-mono);padding:16px;border:1px solid var(--gray-300);border-radius:10px;resize:none;background:var(--white);color:var(--slate);outline:none}
  textarea:focus{border-color:var(--clay)}

  /* Rendered samples */
  .sample-card{background:var(--white);border:1px solid var(--gray-300);border-radius:10px;overflow:hidden}
  .sample-card .sample-header{font:500 12px/1.4 var(--font-sans);padding:10px 14px;background:var(--gray-150);color:var(--gray-500);border-bottom:1px solid var(--gray-300)}
  .sample-card .sample-body{padding:14px;font-size:14px;line-height:1.6;color:var(--gray-700);white-space:pre-wrap}
  .sample-body .slot-highlight{background:var(--info);color:var(--white);padding:1px 4px;border-radius:3px;font-family:var(--font-mono);font-size:12px}
</style>
</head>
<body>

<h1><!-- TITLE e.g. "Support reply prompt tuner" --></h1>
<p class="subtitle"><!-- Description. e.g. "Edit the template on the left; 3 sample tickets re-render on the right." --></p>

<div class="toolbar">
  <button class="btn primary" onclick="copyPrompt()">Copy prompt</button>
  <button class="btn" onclick="resetPrompt()">Reset</button>
  <span class="copied-toast" id="toast">Copied!</span>
  <span class="stats" id="stats">0 chars · ~0 tokens</span>
</div>

<div class="slot-info" id="slotsInfo">
  <span style="color:var(--gray-500);font-size:12px">Available slots:</span>
  <!-- Slot names filled by JS -->
</div>

<div class="main-pane">
  <div class="left-pane">
    <div class="editor-wrap">
      <label>Template</label>
      <textarea id="template" oninput="renderSamples()" placeholder="Enter your prompt template using {{slot_name}} syntax..."></textarea>
    </div>
  </div>
  <div class="right-pane" id="samples">
    <!-- Sample cards rendered by JS -->
  </div>
</div>

<script>
  const defaultTemplate = `You are a customer support agent for {{company_name}}.

The user has sent the following message:
---
{{user_message}}
---

Their account tier is {{account_tier}} and they've been a customer since {{signup_date}}.

Please draft a helpful, empathetic reply. Be concise but thorough.`;

  const samples = [
    { company_name:'Birchline', user_message:'I can\'t figure out how to invite my teammate to a shared project. The button seems to be missing?', account_tier:'Pro', signup_date:'March 2024' },
    { company_name:'Birchline', user_message:'My task export is stuck at "processing" for 45 minutes. I need this for a meeting in 10.', account_tier:'Enterprise', signup_date:'January 2023' },
    { company_name:'Birchline', user_message:'Just wanted to say the new bulk import is incredible. Saved me hours this week!', account_tier:'Free', signup_date:'last week' },
  ];

  let debounceTimer;

  function renderSamples() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const template = document.getElementById('template').value;
      const container = document.getElementById('samples');
      container.innerHTML = '';

      // Update stats
      const chars = template.length;
      const approxTokens = Math.round(chars / 3.5);
      document.getElementById('stats').textContent = `${chars} chars · ~${approxTokens} tokens`;

      // Extract slots
      const slotMatches = template.match(/\{\{(\w+)\}\}/g) || [];
      const slotNames = slotMatches.map(s => s.replace(/[{}]/g, ''));
      document.getElementById('slotsInfo').innerHTML =
        '<span style="color:var(--gray-500);font-size:12px">Available slots: </span>' +
        [...new Set(slotNames)].map(s => `<code style="font-size:11px;background:var(--gray-150);padding:1px 6px;border-radius:3px">{{${s}}}</code>`).join(' ');

      // Render each sample
      samples.forEach((sample, i) => {
        let rendered = template;
        for (const [key, value] of Object.entries(sample)) {
          rendered = rendered.replace(new RegExp(`\\{\\{${key}\\}\\}`, 'g'),
            `<span class="slot-highlight">${value}</span>`);
        }
        // Also replace unfilled slots with a visual placeholder
        rendered = rendered.replace(/\{\{(\w+)\}\}/g, '<span style="color:var(--gray-500);font-style:italic">[$1]</span>');

        const card = document.createElement('div');
        card.className = 'sample-card';
        card.innerHTML = `
          <div class="sample-header">Sample ${i + 1} · ${sample.account_tier} tier</div>
          <div class="sample-body">${rendered}</div>`;
        container.appendChild(card);
      });
    }, 300);
  }

  function copyPrompt() {
    const text = document.getElementById('template').value;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    });
  }

  function resetPrompt() {
    document.getElementById('template').value = defaultTemplate;
    renderSamples();
  }

  // Initialize
  document.getElementById('template').value = defaultTemplate;
  renderSamples();
</script>

</body>
</html>
