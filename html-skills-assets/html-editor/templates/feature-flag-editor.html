<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Flag Editor</title>
<style>
  :root { --ivory:#FAF9F5; --slate:#141413; --clay:#D97757; --olive:#788C5D; --oat:#E3DACC; --gray-150:#F0EEE6; --gray-300:#D1CFC5; --gray-500:#87867F; --gray-700:#3D3D3A; --white:#FFF; --warning:#C78E3F; --font-sans:system-ui,-apple-system,sans-serif; --font-mono:ui-monospace,Menlo,monospace; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font:430 16px/1.55 var(--font-sans);color:var(--slate);background:var(--ivory);max-width:800px;margin:0 auto;padding:32px 24px;-webkit-font-smoothing:antialiased}
  h1{font:500 24px/1.2 var(--font-sans);margin-bottom:4px}
  .subtitle{color:var(--gray-500);font-size:13px;margin-bottom:8px}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:12px 16px;background:var(--white);border:1px solid var(--gray-300);border-radius:10px}
  .changes-badge{font:12px var(--font-mono);padding:4px 12px;border-radius:10px;background:var(--gray-150);color:var(--gray-500)}
  .changes-badge.has-changes{background:var(--clay);color:var(--white)}
  .btn{font:500 13px/1.4 var(--font-sans);padding:7px 16px;border-radius:7px;border:1px solid var(--gray-300);background:var(--white);cursor:pointer}
  .btn:hover{background:var(--gray-150)}
  .btn.primary{background:var(--slate);color:var(--white);border-color:var(--slate)}
  .btn.primary:hover{background:var(--gray-700)}
  .copied-toast{font:13px var(--font-sans);color:var(--olive);display:none}
  .copied-toast.show{display:inline}

  /* Warning banner */
  .warning-banner{background:var(--warning);color:var(--white);padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
  .warning-banner.show{display:block}

  /* Flag groups */
  .group{margin-bottom:24px}
  .group h3{font:500 13px/1.4 var(--font-sans);color:var(--gray-500);text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--gray-150)}
  .flag{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--white);border:1px solid var(--gray-150);border-radius:8px;margin-bottom:6px}
  .flag:hover{border-color:var(--gray-300)}
  .flag-info{flex:1}
  .flag-name{font:500 14px/1.3 var(--font-sans)}
  .flag-desc{font-size:13px;color:var(--gray-500)}
  .flag-meta{font:11px var(--font-mono);color:var(--gray-500);margin-top:4px}

  /* Toggle */
  .toggle{width:44px;height:24px;border-radius:12px;background:var(--gray-300);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
  .toggle.on{background:var(--olive)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--white);transition:left .2s}
  .toggle.on::after{left:22px}

  /* Diff output */
  .diff-output{background:var(--white);border:1px solid var(--gray-300);border-radius:10px;margin-top:24px;overflow:hidden;display:none}
  .diff-output.show{display:block}
  .diff-output h3{font:500 13px/1.4 var(--font-sans);padding:12px 16px;background:var(--gray-150);border-bottom:1px solid var(--gray-300)}
  .diff-output pre{font:13px/1.5 var(--font-mono);padding:16px;margin:0;background:var(--ivory);border:none;border-radius:0}
</style>
</head>
<body>

<h1><!-- CONFIG NAME e.g. "flags.production.json" --></h1>
<p class="subtitle"><!-- Description --></p>

<div class="toolbar">
  <span class="changes-badge" id="changesBadge">0 changed</span>
  <span style="flex:1"></span>
  <button class="btn primary" onclick="copyDiff()">Copy diff</button>
  <button class="btn" onclick="copyFull()">Copy full JSON</button>
  <button class="btn" onclick="resetFlags()">Reset</button>
  <span class="copied-toast" id="toast">Copied!</span>
</div>

<div class="warning-banner" id="warnings"><!-- Filled by JS --></div>

<div id="flagGroups"><!-- Generated by JS --></div>

<div class="diff-output" id="diffOutput">
  <h3>Pending changes</h3>
  <pre id="diffPre">{}</pre>
</div>

<script>
  // --- Flag Data ---
  const initialState = {
    experiments: {
      task_comments_v1: { value: false, desc: 'Comment threads on task cards', deps: [], group: 'Experiments' },
      bulk_import_v2: { value: true, desc: 'CSV/JSON bulk import with column mapping', deps: [], group: 'Experiments' },
    },
    performance: {
      notify_queue_v2: { value: false, desc: 'Move notification delivery onto pg-boss queue', deps: [], group: 'Performance' },
      batch_auth_lookup: { value: true, desc: 'Scoped batch auth check for sync API', deps: ['notify_queue_v2'], group: 'Performance' },
      sync_worker_pool: { value: false, desc: 'Configurable connection pool per worker tier', deps: [], group: 'Performance' },
    },
    access: {
      sso_group_mapping: { value: false, desc: 'SSO group-to-role mapping', deps: [], group: 'Access Control' },
    },
  };

  let currentState = JSON.parse(JSON.stringify(initialState));

  // --- Render ---
  function render() {
    const container = document.getElementById('flagGroups');
    container.innerHTML = '';
    const warnings = [];
    let changedCount = 0;

    for (const [area, flags] of Object.entries(currentState)) {
      const group = document.createElement('div');
      group.className = 'group';
      group.innerHTML = `<h3>${area.replace(/_/g,' ')}</h3>`;
      const groupBody = document.createElement('div');

      for (const [key, flag] of Object.entries(flags)) {
        // Check dependencies
        const depWarnings = [];
        for (const dep of flag.deps) {
          const depFlag = findFlag(dep);
          if (depFlag && !depFlag.value) {
            warnings.push(`⚠ <strong>${key}</strong> is enabled without its prerequisite <strong>${dep}</strong>`);
            depWarnings.push(dep);
          }
        }

        const flagEl = document.createElement('div');
        flagEl.className = 'flag';
        if (depWarnings.length) flagEl.style.borderColor = 'var(--warning)';
        flagEl.innerHTML = `
          <div class="flag-info">
            <div class="flag-name">${key}</div>
            <div class="flag-desc">${flag.desc}</div>
            ${flag.deps.length ? `<div class="flag-meta">requires: ${flag.deps.join(', ')}</div>` : ''}
          </div>
          <div class="toggle ${flag.value ? 'on' : ''}" onclick="toggleFlag('${area}','${key}')"></div>`;
        groupBody.appendChild(flagEl);

        // Check if changed
        if (initialState[area]?.[key]?.value !== flag.value) changedCount++;
      }
      group.appendChild(groupBody);
      container.appendChild(group);
    }

    // Update badge
    const badge = document.getElementById('changesBadge');
    badge.textContent = changedCount + ' changed';
    badge.className = 'changes-badge' + (changedCount > 0 ? ' has-changes' : '');

    // Show warnings
    const warnEl = document.getElementById('warnings');
    if (warnings.length) {
      warnEl.innerHTML = warnings.join('<br>');
      warnEl.classList.add('show');
    } else {
      warnEl.classList.remove('show');
    }
  }

  function findFlag(key) {
    for (const area of Object.values(currentState)) {
      if (area[key]) return area[key];
    }
    return null;
  }

  function toggleFlag(area, key) {
    currentState[area][key].value = !currentState[area][key].value;
    render();
  }

  // --- Copy ---
  function copyDiff() {
    const diff = {};
    for (const [area, flags] of Object.entries(currentState)) {
      for (const [key, flag] of Object.entries(flags)) {
        if (initialState[area]?.[key]?.value !== flag.value) {
          diff[key] = flag.value;
        }
      }
    }
    const diffJson = JSON.stringify(diff, null, 2);
    document.getElementById('diffPre').textContent = diffJson;
    document.getElementById('diffOutput').classList.add('show');
    navigator.clipboard.writeText(diffJson).then(showToast);
  }

  function copyFull() {
    const full = {};
    for (const [area, flags] of Object.entries(currentState)) {
      for (const [key, flag] of Object.entries(flags)) {
        full[key] = flag.value;
      }
    }
    const fullJson = JSON.stringify(full, null, 2);
    navigator.clipboard.writeText(fullJson).then(showToast);
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }

  function resetFlags() {
    currentState = JSON.parse(JSON.stringify(initialState));
    render();
    document.getElementById('diffOutput').classList.remove('show');
  }

  render();
</script>

</body>
</html>
